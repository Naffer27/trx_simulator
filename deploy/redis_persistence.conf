# ============================================================
# redis_persistence.conf — Redis persistence settings for trx_sim
#
# Include in your main redis.conf with:
#   include /opt/trx_sim/deploy/redis_persistence.conf
#
# Or copy these settings into /etc/redis/redis.conf
#
# These settings protect against data loss on restart.
# Redis stores: channel layer state, Celery queues, rate limit
# counters, session data, and trx:metrics:* operational data.
# ============================================================

# ── AOF (Append Only File) ────────────────────────────────────
# Logs every write command — provides ~1-second durability.
appendonly yes

# everysec: fsync once per second. Best balance of durability vs
# performance. Worst case: lose ~1 second of writes on crash.
appendfsync everysec

# Disable rewrite during RDB save to prevent double disk I/O
no-appendfsync-on-rewrite yes

# Trigger AOF rewrite when file grows 100% and is at least 64MB
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# ── RDB snapshots (secondary safety net) ─────────────────────
# Save snapshot if N writes occurred in T seconds.
# Provides recovery points in addition to AOF.
save 900 1      # at least 1 write in 15 min
save 300 10     # at least 10 writes in 5 min
save 60 100     # at least 100 writes in 1 min

# Stop accepting writes if RDB save fails (visible alert)
stop-writes-on-bgsave-error yes

# Compress RDB snapshots (slower save, smaller file)
rdbcompression yes

# Filename and directory for RDB snapshots
dbfilename trx_sim_dump.rdb
# dir /var/lib/redis    # set dir in main redis.conf

# ── AOF file location ─────────────────────────────────────────
appendfilename "trx_sim_aof.aof"
# dir is shared with RDB above

# ── Memory limit ─────────────────────────────────────────────
# Adjust to your server RAM. For a 2GB server, 512MB is conservative.
# maxmemory 512mb
# maxmemory-policy allkeys-lru   # evict LRU keys when full

# ── Slow log ─────────────────────────────────────────────────
# Log queries slower than 10ms — useful for diagnosing load test bottlenecks
slowlog-log-slower-than 10000
slowlog-max-len 128
