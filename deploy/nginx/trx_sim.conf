# ============================================================
# Nginx reverse proxy for trx_sim (Django/Daphne + WebSockets)
#
# Install:
#   sudo cp deploy/nginx/trx_sim.conf /etc/nginx/sites-available/trx_sim
#   sudo ln -s /etc/nginx/sites-available/trx_sim /etc/nginx/sites-enabled/trx_sim
#   sudo nginx -t && sudo systemctl reload nginx
#
# Replace YOUR_DOMAIN with your actual domain before deploying.
# ============================================================

# Upstream: Daphne ASGI server
upstream daphne {
    server 127.0.0.1:8001;
    keepalive 32;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS main server ─────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # ── TLS ──────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:50m;
    ssl_session_tickets off;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;

    # HSTS — 6 months, include subdomains
    add_header Strict-Transport-Security "max-age=15768000; includeSubDomains" always;

    # ── Security headers ─────────────────────────────────────
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # ── Gzip ─────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    # ── Client limits ─────────────────────────────────────────
    client_max_body_size 5m;

    # ── Static files (served by Nginx, no Django overhead) ───
    location /static/ {
        alias /opt/trx_sim/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── WebSocket connections ─────────────────────────────────
    # CRITICAL: must come before the generic / block.
    # Without Upgrade + Connection headers, WebSocket handshake silently fails.
    location /ws/ {
        proxy_pass http://daphne;
        proxy_http_version 1.1;

        # WebSocket upgrade headers — required for Channels
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Forward real client IP (used by get_client_ip() for security logging)
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;

        # Keep-alive for long-lived WS connections (heartbeat is 30s, timeout 90s)
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # Disable buffering for real-time data
        proxy_buffering off;
    }

    # ── All other requests → Django/Daphne ───────────────────
    location / {
        proxy_pass http://daphne;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Required for Django CSRF behind proxy
        proxy_set_header X-Request-ID $request_id;

        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;

        proxy_redirect off;
    }

    # ── Health check (no auth, Nginx health probes) ───────────
    location = /api/health/ {
        proxy_pass http://daphne;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 15s;
        access_log off;
    }

    # ── Deny hidden files ─────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Logs ─────────────────────────────────────────────────
    access_log /var/log/nginx/trx_sim.access.log;
    error_log  /var/log/nginx/trx_sim.error.log warn;
}
