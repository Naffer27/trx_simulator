{% extends "simulator/base_app.html" %}
{% block content %}
<div class="container">
  <h2>Buy Challenge: {{ product.name }}</h2>
  <p>Tier: {{ product.tier }} — Price: ${{ product.price_usd }}</p>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  <form method="post">
    {% csrf_token %}
    <select name="crypto_currency">
      {% for code, label in crypto_choices %}
      <option value="{{ code }}">{{ label }}</option>
      {% endfor %}
    </select>
    <button type="submit">Pay ${{ product.price_usd }}</button>
  </form>
</div>
{% endblock %}
