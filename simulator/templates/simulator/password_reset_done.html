{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Email Sent — Money Brokers</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --gold: #FFD700; --amber: #FFA500; --bg: #05050a; --card: #0d0d14; --border: rgba(255,215,0,.18); --muted: #666; }
    html, body { height: 100%; background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
    #auth-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    .auth-wrap { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; }
    .auth-brand { font-family: 'Orbitron', sans-serif; font-size: .88rem; font-weight: 900; letter-spacing: .14em; color: var(--gold); text-decoration: none; margin-bottom: 40px; }
    .auth-brand:hover { color: var(--amber); }
    .auth-card { width: 100%; max-width: 400px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 40px 36px; box-shadow: 0 0 40px rgba(255,215,0,.08), 0 24px 48px rgba(0,0,0,.6); text-align: center; }
    .auth-title { font-family: 'Orbitron', sans-serif; font-size: 1.1rem; font-weight: 900; letter-spacing: .06em; color: #fff; margin-bottom: 12px; }
    .auth-body { font-size: .85rem; color: var(--muted); line-height: 1.6; margin-bottom: 32px; }
    .auth-footer { margin-top: 24px; font-size: .8rem; color: var(--muted); }
    .auth-footer a { color: var(--gold); text-decoration: none; font-weight: 600; }
    .auth-footer a:hover { color: var(--amber); }
    .icon { font-size: 2.5rem; margin-bottom: 20px; }
  </style>
</head>
<body>
<canvas id="auth-canvas"></canvas>
<div class="auth-wrap">
  <a class="auth-brand" href="{% url 'simulator:landing' %}">MONEY BROKERS</a>
  <div class="auth-card">
    <div class="icon">&#9993;</div>
    <h1 class="auth-title">Check Your Email</h1>
    <p class="auth-body">
      If an account exists for that email address, you will receive a password reset link shortly.
      Please check your inbox (and spam folder).
    </p>
    <p class="auth-footer">
      <a href="{% url 'simulator:login' %}">&larr; Back to Login</a>
    </p>
  </div>
</div>
<script>
(function(){const c=document.getElementById('auth-canvas'),x=c.getContext('2d');let W,H,P=[];function resize(){W=c.width=innerWidth;H=c.height=innerHeight;}function Pt(){this.x=Math.random()*W;this.y=Math.random()*H;this.r=Math.random()*1.2+.2;this.vx=(Math.random()-.5)*.2;this.vy=(Math.random()-.5)*.2;this.a=Math.random()*.4+.08;}function init(){P=Array.from({length:60},()=>new Pt());}function draw(){x.clearRect(0,0,W,H);x.strokeStyle='rgba(255,215,0,0.022)';x.lineWidth=1;const g=80;for(let i=0;i<W;i+=g){x.beginPath();x.moveTo(i,0);x.lineTo(i,H);x.stroke();}for(let i=0;i<H;i+=g){x.beginPath();x.moveTo(0,i);x.lineTo(W,i);x.stroke();}P.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;x.beginPath();x.arc(p.x,p.y,p.r,0,Math.PI*2);x.fillStyle=`rgba(255,215,0,${p.a})`;x.fill();});requestAnimationFrame(draw);}resize();init();draw();window.addEventListener('resize',resize);})();
</script>
</body>
</html>
